name: Frontend Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        run: npm run type-check

      - name: Run Unit Tests
        run: npm run test:unit -- --run

      - name: Build Application
        run: npm run build
